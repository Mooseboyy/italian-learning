<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<a id="dl192" download="icon-192.png">Download 192</a><br>
<a id="dl512" download="icon-512.png">Download 512</a>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  ctx.fillStyle = '#0f1117';
  ctx.fillRect(0, 0, s, s);
  const r = s * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s); ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fillStyle = '#1a1d27';
  ctx.fill();
  ctx.font = `bold ${s * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🇮🇹', s / 2, s / 2);
}
['c192','c512'].forEach(id => {
  const c = document.getElementById(id);
  drawIcon(c);
  document.getElementById('dl' + id.replace('c','')).href = c.toDataURL();
});
</script>
</body>
</html>
